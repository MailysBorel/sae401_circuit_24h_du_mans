<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24H du Mans - Exploration Globale</title>
    <link rel="icon" type="image/png" href="logo_24h_le_mans.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;600;700&family=Outfit:wght@200;300;400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* ======= UI OVERLAY ======= */
        .ui-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 60px;
        }

        .top-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: fadeInDown 1.8s ease-out both;
        }

        .logo-img {
            height: 65px;
            filter: drop-shadow(0 0 25px rgba(255, 255, 255, 0.4));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 16px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .tagline {
            font-size: 0.8rem;
            letter-spacing: 7px;
            text-transform: uppercase;
            opacity: 0.45;
        }

        .bottom-bar {
            display: flex;
            justify-content: center;
            animation: fadeInUp 1.8s 0.6s ease-out both;
        }

        .hint {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.65;
            animation: pulseFade 3s ease-in-out infinite;
        }

        .dot {
            width: 9px;
            height: 9px;
            background: #e10600;
            border-radius: 50%;
            box-shadow: 0 0 12px #e10600;
            animation: dotPulse 1.6s ease-in-out infinite;
        }

        @keyframes dotPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.8);
                opacity: 0.4;
            }
        }

        @keyframes pulseFade {

            0%,
            100% {
                opacity: 0.65;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ======= HOTSPOT LABEL (HTML overlay) ======= */
        #hotspot-label {
            position: fixed;
            z-index: 20;
            pointer-events: none;
            transform: translate(-50%, -140%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #hotspot-label.visible {
            opacity: 1;
        }

        .label-inner {
            background: rgba(225, 6, 0, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 6px;
            padding: 6px 14px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        /* ======= LOADING ======= */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 28px;
            transition: opacity 1.4s ease;
        }

        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            width: 72px;
            animation: spin 2.5s linear infinite;
            filter: drop-shadow(0 0 25px rgba(225, 6, 0, 0.7));
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .bar-bg {
            width: 180px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #e10600, #ff6b6b);
            animation: loadBar 2.5s ease-in-out forwards;
        }

        @keyframes loadBar {
            from {
                width: 0%;
            }

            to {
                width: 100%;
            }
        }

        /* ======= SPEED LINES (vignette zoom) ======= */
        #speed-overlay {
            position: fixed;
            inset: 0;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            background: radial-gradient(ellipse at center,
                    transparent 30%,
                    rgba(0, 0, 0, 0.6) 70%,
                    rgba(0, 0, 0, 0.95) 100%);
        }

        #speed-overlay.active {
            opacity: 1;
        }

        #speed-canvas {
            position: fixed;
            inset: 0;
            z-index: 16;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }

        #speed-canvas.active {
            opacity: 1;
        }

        /* ======= CHECKERED FLAG TRANSITION ======= */
        #checker-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            pointer-events: none;
            display: grid;
        }

        .checker-col {
            display: flex;
            flex-direction: column;
            transform: translateY(-100%);
            transition: none;
        }

        .checker-col.drop {
            transition: transform 0.45s cubic-bezier(0.55, 0, 1, 0.45);
            transform: translateY(0%);
        }

        .checker-cell {
            flex: 1;
        }

        /* ======= ZOOM CTA ======= */
        #zoom-cta {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            text-align: center;
        }

        #zoom-cta.visible {
            opacity: 1;
        }

        #zoom-cta .cta-inner {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: white;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.9), 0 0 80px rgba(225, 6, 0, 0.6);
        }

        #zoom-cta .cta-sub {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 6px;
            color: #e10600;
            margin-top: 8px;
            text-shadow: 0 0 20px rgba(225, 6, 0, 0.8);
        }

        /* ======= CLICK CURSOR ======= */
        canvas {
            cursor: grab;
        }

        canvas.zooming {
            cursor: default;
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <img src="logo_24h_le_mans.png" class="loading-logo" alt="Loading">
        <div class="loading-text">Initialisation de la mission</div>
        <div class="bar-bg">
            <div class="bar-fill"></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="hotspot-label">
        <div class="label-inner">★ CIRCUIT DU MANS</div>
    </div>

    <!-- Speed lines canvas -->
    <canvas id="speed-canvas"></canvas>
    <div id="speed-overlay"></div>

    <!-- Zoom CTA -->
    <div id="zoom-cta">
        <div class="cta-inner">ACCÈS AU CIRCUIT</div>
        <div class="cta-sub">LE MANS · 24H · ENDURANCE</div>
    </div>

    <!-- Checkered flag transition -->
    <div id="checker-overlay"></div>

    <div class="ui-overlay">
        <div class="top-bar">
            <img src="logo_24h_le_mans.png" class="logo-img" alt="24H Le Mans">
            <h1>Circuit du Mans</h1>
            <div class="tagline">Exploration Globale</div>
        </div>
        <div class="bottom-bar">
            <div class="hint">
                <div class="dot"></div>
                Cliquez sur le circuit pour plonger dans l'action
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <script>
        /* ===================================================
           SCENE SETUP
        =================================================== */
        const scene = new THREE.Scene();
        const W = window.innerWidth;
        const H = window.innerHeight;
        const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
        camera.position.set(0, 0, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(W, H);
        renderer.setClearColor(0x000000, 0);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        /* ===================================================
           STARS
        =================================================== */
        const starGeo = new THREE.BufferGeometry();
        const starCount = 8000;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 500;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, sizeAttenuation: true });
        const starMesh = new THREE.Points(starGeo, starMat);
        scene.add(starMesh);

        /* ===================================================
           GLOBE
        =================================================== */
        const globeRadius = 1;
        const earthGeo = new THREE.SphereGeometry(globeRadius, 64, 64);
        const loader = new THREE.TextureLoader();

        // Earth texture from ESRI/unpkg (tile-based won't work, use static img)
        // Using a stable NASA Blue Marble equivalent from raw.github (three.js examples)
        const EARTH_TEXTURE_URL = 'https://raw.githubusercontent.com/mrdoob/three.js/r160/examples/textures/planets/earth_atmos_2048.jpg';
        const EARTH_BUMP_URL = 'https://raw.githubusercontent.com/mrdoob/three.js/r160/examples/textures/planets/earth_normal_2048.jpg';
        const EARTH_SPEC_URL = 'https://raw.githubusercontent.com/mrdoob/three.js/r160/examples/textures/planets/earth_specular_2048.jpg';

        let earthMesh;
        let texturesLoaded = 0;
        const TOTAL_TEXTURES = 3;

        function onTextureLoaded() {
            texturesLoaded++;
            if (texturesLoaded >= TOTAL_TEXTURES) initScene();
        }

        const earthTex = loader.load(EARTH_TEXTURE_URL, onTextureLoaded);
        const earthBump = loader.load(EARTH_BUMP_URL, onTextureLoaded);
        const earthSpec = loader.load(EARTH_SPEC_URL, onTextureLoaded);

        function initScene() {
            const earthMat = new THREE.MeshPhongMaterial({
                map: earthTex,
                bumpMap: earthBump,
                bumpScale: 0.05,
                specularMap: earthSpec,
                specular: new THREE.Color(0x333333),
                shininess: 25,
            });

            earthMesh = new THREE.Mesh(earthGeo, earthMat);
            scene.add(earthMesh);

            // Cloudy atmosphere glow
            const atmGeo = new THREE.SphereGeometry(globeRadius * 1.02, 64, 64);
            const atmMat = new THREE.MeshPhongMaterial({
                color: 0x0088ff,
                transparent: true,
                opacity: 0.07,
                side: THREE.FrontSide,
            });
            scene.add(new THREE.Mesh(atmGeo, atmMat));

            // Outer glow halo
            const haloGeo = new THREE.SphereGeometry(globeRadius * 1.15, 64, 64);
            const haloMat = new THREE.MeshPhongMaterial({
                color: 0x0055ee,
                transparent: true,
                opacity: 0.04,
                side: THREE.BackSide,
            });
            scene.add(new THREE.Mesh(haloGeo, haloMat));

            addHotspot();
            dismissLoading();
        }

        /* ===================================================
           LIGHTS
        =================================================== */
        // Sun light
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.2);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // Ambient
        scene.add(new THREE.AmbientLight(0x222244, 1.5));

        /* ===================================================
           HOTSPOT : LE MANS (47.95°N, 0.205°E)
        =================================================== */
        let hotspotMesh;
        let hotspotWorldPos = new THREE.Vector3();

        function latLngToVec3(lat, lng, r) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            return new THREE.Vector3(
                -r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
        }

        function addHotspot() {
            const pos = latLngToVec3(47.95, 0.205, globeRadius);
            hotspotWorldPos.copy(pos);

            // Glowing dot
            const dotGeo = new THREE.SphereGeometry(0.025, 16, 16);
            const dotMat = new THREE.MeshBasicMaterial({ color: 0xe10600 });
            hotspotMesh = new THREE.Mesh(dotGeo, dotMat);
            hotspotMesh.position.copy(pos);

            // Outer ring
            const ringGeo = new THREE.RingGeometry(0.03, 0.045, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.lookAt(pos.clone().multiplyScalar(2)); // face outward
            hotspotMesh.add(ring);

            earthMesh.add(hotspotMesh);
        }

        /* ===================================================
           HTML OVERLAY LABEL
        =================================================== */
        const hotspotLabel = document.getElementById('hotspot-label');

        function project3DtoScreen(vec3) {
            const v = vec3.clone().project(camera);
            return {
                x: (v.x * 0.5 + 0.5) * window.innerWidth,
                y: (-(v.y) * 0.5 + 0.5) * window.innerHeight
            };
        }

        /* ===================================================
           ROTATION & ANIMATION
        =================================================== */
        let isRotating = true;
        let isZooming = false;
        let rotationSpeed = 0.0015;

        // Mouse drag
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        const canvas = renderer.domElement;

        canvas.addEventListener('mousedown', e => {
            if (isZooming) return;
            isDragging = true;
            isRotating = false;
            prevMouse = { x: e.clientX, y: e.clientY };
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            if (!isZooming) canvas.style.cursor = 'grab';
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging || isZooming) return;
            const dx = e.clientX - prevMouse.x;
            const dy = e.clientY - prevMouse.y;
            prevMouse = { x: e.clientX, y: e.clientY };

            if (earthMesh) {
                earthMesh.rotation.y += dx * 0.005;
                earthMesh.rotation.x += dy * 0.005;
                earthMesh.rotation.x = Math.max(-1.2, Math.min(1.2, earthMesh.rotation.x));
            }
        });

        /* ===================================================
           RAYCASTING — Clic sur hotspot
        =================================================== */
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        canvas.addEventListener('click', e => {
            if (isZooming || isDragging) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Test sur la sphère entière mais on restreint à proximité du hotspot
            if (!hotspotMesh) return;

            const worldHotspot = new THREE.Vector3();
            hotspotMesh.getWorldPosition(worldHotspot);

            const ray = raycaster.ray;
            const dist = ray.distanceToPoint(worldHotspot);

            if (dist < 0.08) {
                startZoom();
            }
        });

        /* ===================================================
           SPEED LINES CANVAS
        =================================================== */
        const speedCanvas = document.getElementById('speed-canvas');
        const sCtx = speedCanvas.getContext('2d');
        function resizeSpeedCanvas() {
            speedCanvas.width = window.innerWidth;
            speedCanvas.height = window.innerHeight;
        }
        resizeSpeedCanvas();
        window.addEventListener('resize', resizeSpeedCanvas);

        let speedIntensity = 0;
        let speedAnimId = null;

        function drawSpeedLines(intensity) {
            const w = speedCanvas.width;
            const h = speedCanvas.height;
            const cx = w / 2, cy = h / 2;
            sCtx.clearRect(0, 0, w, h);

            const lineCount = 80;
            for (let i = 0; i < lineCount; i++) {
                const angle = (i / lineCount) * Math.PI * 2;
                const len = (200 + Math.random() * 400) * intensity;
                const startR = 80 + Math.random() * 100;

                sCtx.beginPath();
                sCtx.moveTo(cx + Math.cos(angle) * startR, cy + Math.sin(angle) * startR);
                sCtx.lineTo(cx + Math.cos(angle) * (startR + len), cy + Math.sin(angle) * (startR + len));
                sCtx.strokeStyle = `rgba(255,255,255,${0.05 + Math.random() * 0.12 * intensity})`;
                sCtx.lineWidth = 0.5 + Math.random() * 1.5;
                sCtx.stroke();
            }
        }

        /* ===================================================
           CHECKERED FLAG TRANSITION
        =================================================== */
        function buildCheckerOverlay() {
            const overlay = document.getElementById('checker-overlay');
            overlay.innerHTML = '';
            const COLS = 10;
            const ROWS = 6;
            overlay.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

            for (let c = 0; c < COLS; c++) {
                const col = document.createElement('div');
                col.className = 'checker-col';
                col.style.transitionDelay = `${c * 42}ms`;
                for (let r = 0; r < ROWS; r++) {
                    const cell = document.createElement('div');
                    cell.className = 'checker-cell';
                    const isBlack = (c + r) % 2 === 0;
                    cell.style.background = isBlack ? '#000' : '#fff';
                    col.appendChild(cell);
                }
                overlay.appendChild(col);
            }
        }
        buildCheckerOverlay();

        function launchCheckerFlag(callback) {
            const cols = document.querySelectorAll('.checker-col');
            cols.forEach(col => col.classList.add('drop'));
            setTimeout(callback, 1000); // dernière colonne finit à ~828ms (378ms stagger + 450ms transition)
        }

        /* ===================================================
           ZOOM CINÉMATIQUE — STYLE LE MANS
        =================================================== */
        function startZoom() {
            if (isZooming) return;
            isZooming = true;
            isRotating = false;
            canvas.classList.add('zooming');
            document.querySelector('.bottom-bar').style.transition = 'opacity 0.5s';
            document.querySelector('.bottom-bar').style.opacity = '0';

            const worldHotspot = new THREE.Vector3();
            hotspotMesh.getWorldPosition(worldHotspot);

            const startPos = camera.position.clone();
            const endPos = worldHotspot.clone().normalize().multiplyScalar(1.45);

            const DURATION = 2800;
            let tStart = null;
            let flagLaunched = false;

            // Activer les speed lines
            document.getElementById('speed-canvas').classList.add('active');
            document.getElementById('speed-overlay').classList.add('active');

            function zoomAnim(ts) {
                if (!tStart) tStart = ts;
                const t = Math.min((ts - tStart) / DURATION, 1);
                const ease = 1 - Math.pow(1 - t, 3);

                camera.position.lerpVectors(startPos, endPos, ease);
                camera.lookAt(0, 0, 0);

                // Dessiner les speed lines avec intensité croissante
                speedIntensity = Math.min(t * 1.8, 1.0);
                drawSpeedLines(speedIntensity);

                // Afficher le CTA texte
                document.getElementById('zoom-cta').classList.toggle('visible', t > 0.3);

                // Lancer le drapeau à damiers
                if (t > 0.72 && !flagLaunched) {
                    flagLaunched = true;
                    document.getElementById('zoom-cta').classList.remove('visible');
                    launchCheckerFlag(() => {
                        window.location.href = 'circuit2.html';
                    });
                }

                if (t < 1) requestAnimationFrame(zoomAnim);
            }

            requestAnimationFrame(zoomAnim);
        }

        /* ===================================================
           HOVER LABEL
        =================================================== */
        canvas.addEventListener('mousemove', e => {
            if (isZooming || !hotspotMesh) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const worldH = new THREE.Vector3();
            hotspotMesh.getWorldPosition(worldH);
            const dist = raycaster.ray.distanceToPoint(worldH);

            if (dist < 0.08) {
                const screen = project3DtoScreen(worldH);
                hotspotLabel.style.left = screen.x + 'px';
                hotspotLabel.style.top = screen.y + 'px';
                hotspotLabel.classList.add('visible');
                canvas.style.cursor = 'pointer';
            } else {
                hotspotLabel.classList.remove('visible');
                if (!isDragging) canvas.style.cursor = 'grab';
            }
        });

        /* ===================================================
           RENDER LOOP
        =================================================== */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const t = clock.getElapsedTime();

            // Rotation auto
            if (isRotating && earthMesh) {
                earthMesh.rotation.y += rotationSpeed;
            }

            // Pulsation hotspot
            if (hotspotMesh) {
                const pulse = 1 + 0.15 * Math.sin(t * 4);
                hotspotMesh.scale.setScalar(pulse);

                // Maintenir le label
                if (hotspotLabel.classList.contains('visible')) {
                    const worldH = new THREE.Vector3();
                    hotspotMesh.getWorldPosition(worldH);
                    const screen = project3DtoScreen(worldH);
                    hotspotLabel.style.left = screen.x + 'px';
                    hotspotLabel.style.top = screen.y + 'px';
                }
            }

            renderer.render(scene, camera);
        }

        /* ===================================================
           LOADING
        =================================================== */
        function dismissLoading() {
            setTimeout(() => {
                const ls = document.getElementById('loading-screen');
                ls.classList.add('fade-out');
                setTimeout(() => {
                    ls.style.display = 'none';
                    isRotating = true;
                }, 1400);
                animate();
            }, 2500);
        }
    </script>
</body>

</html>
