<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Globe Le Mans - Satellite 4K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link rel="icon" type="image/png" href="logo_24h_le_mans.png">
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

<div class="overlay">
    <h1>DESTINATION : LE MANS</h1>
    <div class="hint">Cliquez sur le marqueur pour plonger au cœur du circuit</div>
</div>

<!-- Sound Control Suite -->
<div class="sound-suite-container">
    <div class="volume-slider-wrapper">
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
    </div>
    <button id="sound-toggle" class="sound-control" title="Activer/Désactiver le son">
        <svg id="sound-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
        </svg>
    </button>
</div>

<!-- Cinematic Audio -->
<audio id="bg-music" src="asset/Gt5.mp3" loop preload="auto"></audio>
<audio id="vroom-sound" src="asset/vroomvroom.mp3" preload="auto"></audio>

<div id="map"></div>

<!-- Speed lines canvas -->
<canvas id="speed-canvas"></canvas>
<div id="speed-overlay"></div>

<!-- Zoom CTA -->
<div id="zoom-cta">
    <div class="cta-inner">ACCÈS AU CIRCUIT</div>
    <div class="cta-sub">LE MANS · 24H · ENDURANCE</div>
</div>

<div id="checker-overlay"></div>

<script src="js/index.js"></script>
</body>
</html>
